# VidyaX - SFU Configuration
# Default configuration with SFU topology enabled

# Base URL for the application
base_url: /

# ICE (Interactive Connectivity Establishment) servers for NAT traversal
ice_servers:
  - urls:
      - 'stun:stun.l.google.com:19302'
      - 'stun:stun1.l.google.com:19302'

# TLS/SSL configuration (optional, comment out for HTTP)
# tls:
#   cert: /path/to/cert.pem
#   key: /path/to/key.pem

# Data store configuration (in-memory by default for development)
store:
  type: memory
  # For production with multiple instances, use Redis:
  # type: redis
  # redis:
  #   host: localhost
  #   port: 6379
  #   prefix: peercalls

# Network topology: SFU (Selective Forwarding Unit)
# - SFU: Server-based relay (recommended for scalability)
# - Mesh: Direct P2P connections (default for low latency)
network:
  type: 'sfu'
  sfu:
    # UDP port range for media transport
    udp:
      port_min: 9000
      port_max: 9100
    
    # TCP binding for ICE candidates
    tcp_bind_addr: "0.0.0.0"
    tcp_listen_port: 3001
    
    # Network protocols (udp, tcp, or both)
    protocols:
      - udp
      - tcp
    
    # Optional: Jitter buffer for audio smoothing
    jitter_buffer: false
    
    # Optional: Filter to specific network interfaces
    # interfaces:
    #   - eth0
    #   - docker0

# Logging configuration
log:
  level: info
  format: text

# Metrics and monitoring (Prometheus)
prometheus:
  enabled: false
  listen_addr: "0.0.0.0:8090"

# Performance profiling (pprof)
pprof:
  enabled: false
  listen_addr: "0.0.0.0:6060"
